title: Suspicious PowerShell Execution
id: phantom-ps-001
status: stable
description: |
    Detects execution of PowerShell with encoded commands or known
    suspicious download cradles used for malware delivery.
author: PHANTOM
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_encoded:
        CommandLine|contains:
            - '-enc'
            - '-encodedcommand'
            - '-EncodedCommand'
            - 'FromBase64String'
    selection_download:
        CommandLine|contains:
            - 'Invoke-WebRequest'
            - 'DownloadString'
            - 'DownloadFile'
            - 'Invoke-Expression'
            - 'IEX'
            - 'Net.WebClient'
    selection_bypass:
        CommandLine|contains:
            - '-ExecutionPolicy Bypass'
            - '-ep bypass'
            - '-nop'
    condition: selection_encoded or (selection_download and selection_bypass)
falsepositives:
    - Legitimate admin scripts using encoded commands
    - Software deployment tools
level: high
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1027
