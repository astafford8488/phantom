title: Credential Dumping Tools
id: phantom-cred-001
status: stable
description: |
    Detects execution of known credential dumping tools targeting
    LSASS memory, SAM database, or Active Directory credentials.
author: PHANTOM
date: 2024/01/15
logsource:
    category: process_creation
    product: windows
detection:
    selection_tools:
        CommandLine|contains:
            - 'mimikatz'
            - 'sekurlsa'
            - 'gsecdump'
            - 'pwdumpx'
            - 'lazagne'
    selection_lsass:
        CommandLine|contains:
            - 'procdump'
            - 'MiniDump'
            - 'comsvcs.dll'
        CommandLine|contains:
            - 'lsass'
    selection_ntds:
        CommandLine|contains:
            - 'ntdsutil'
            - 'vssadmin'
            - 'NTDS.dit'
    condition: selection_tools or selection_lsass or selection_ntds
falsepositives:
    - Legitimate security assessments
    - Authorized penetration testing
level: critical
tags:
    - attack.credential_access
    - attack.t1003
    - attack.t1003.001
    - attack.t1003.003
